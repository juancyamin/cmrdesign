name: R

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: r
          extra-packages: any::testthat, any::jsonlite, any::knitr, any::rmarkdown

      - name: Install package for vignette chunks
        run: R CMD INSTALL r

      - name: Run vignette chunks
        run: |
          for (file in list.files("r/vignettes", pattern = "[.]Rmd$", full.names = TRUE)) {
            message("Running vignette chunks: ", file)
            script <- tempfile(fileext = ".R")
            knitr::purl(file, output = script, quiet = TRUE)
            source(script, echo = TRUE)
          }
        shell: Rscript {0}

      - name: Check package
        run: |
          R CMD build --no-build-vignettes r
          R CMD check --no-manual --ignore-vignettes cmrdesign_*.tar.gz
