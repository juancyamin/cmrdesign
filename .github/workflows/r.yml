name: R

on:
  push:
  pull_request:

jobs:
  check:
    name: R (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: r
          extra-packages: any::testthat, any::jsonlite, any::knitr, any::rmarkdown, any::remotes

      - name: Install roxygen2 version used for generated docs
        if: matrix.os == 'ubuntu-latest'
        run: |
          remotes::install_version(
            "roxygen2",
            version = "7.3.2",
            repos = "https://cloud.r-project.org",
            upgrade = "never"
          )
        shell: Rscript {0}

      - name: Check generated R documentation
        if: matrix.os == 'ubuntu-latest'
        run: |
          roxygen2::roxygenise("r")
          status <- system2(
            "git",
            c("status", "--porcelain", "r/NAMESPACE", "r/man"),
            stdout = TRUE
          )
          if (length(status) > 0L) {
            cat(status, sep = "\n")
            quit(status = 1L)
          }
        shell: Rscript {0}

      - name: Install package for vignette chunks
        run: R CMD INSTALL r
        shell: bash

      - name: Run vignette chunks
        run: |
          for (file in list.files("r/vignettes", pattern = "[.]Rmd$", full.names = TRUE)) {
            message("Running vignette chunks: ", file)
            script <- tempfile(fileext = ".R")
            knitr::purl(file, output = script, quiet = TRUE)
            source(script, echo = TRUE)
          }
        shell: Rscript {0}

      - name: Check package
        run: |
          R CMD build --no-build-vignettes r
          R CMD check --no-manual --ignore-vignettes cmrdesign_*.tar.gz
        shell: bash
