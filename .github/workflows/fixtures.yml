name: Fixtures

on:
  push:
  pull_request:

jobs:
  parity:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: r
          extra-packages: any::testthat, any::jsonlite

      - name: Install R package
        run: R CMD INSTALL r

      - name: Install Python package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e python

      - name: Regenerate fixtures
        run: Rscript spec/scripts/generate_fixtures.R

      - name: Check fixture drift
        run: python spec/scripts/check_fixture_drift.py

      - name: Run Python fixture tests
        run: python -m unittest discover -s python/tests -p "test_cross_fixtures.py" -v

      - name: Run R fixture tests
        run: |
          library(cmrdesign)
          testthat::test_file("r/tests/testthat/test-cross-fixtures.R")
        shell: Rscript {0}
