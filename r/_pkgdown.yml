url: https://juancyamin.github.io/cmrdesign/
template:
  bootstrap: 5

development:
  mode: release

home:
  title: Conditional Minimax Regret design rules
  description: >
    R tools for applying Conditional Minimax Regret design rules to
    pilot-informed experiments.

navbar:
  structure:
    left: [reference, articles, news]
    right: [search, github]
  components:
    articles:
      text: Articles
      menu:
        - text: Two-arm bounded outcomes
          href: articles/two-arm-bounded.html
        - text: Binary outcomes
          href: articles/binary-outcomes.html
        - text: CMR extensions
          href: articles/extensions.html
        - text: Multiple outcomes
          href: articles/multiple-outcomes.html
        - text: Proxy outcomes
          href: articles/proxy-outcomes.html
        - text: Pilot planning
          href: articles/pilot-planning.html
        - text: Paper
          href: https://arxiv.org/abs/2607.16982
        - text: Python package
          href: https://pypi.org/project/cmrdesign/

articles:
  - title: Applied tutorials
    navbar: ~
    contents:
      - two-arm-bounded
      - binary-outcomes
      - extensions
      - multiple-outcomes
      - proxy-outcomes
      - pilot-planning

reference:
  - title: Applied CMR rules
    desc: >
      User-facing rules that estimate a confidence set from pilot data and
      return a recommended main-wave allocation plus a regret certificate.
    contents:
      - starts_with("cmr_")
      - pilot_plan

  - title: Pilot planning
    desc: >
      Appendix E-style screens for planning the pilot/main-wave split before
      collecting pilot data.
    contents:
      - starts_with("activation_threshold_")
      - pilot_viability_band
      - break_even_pilot_share

  - title: Confidence rectangles and variance bounds
    desc: >
      Expert and audit helpers for the confidence sets used by CMR rules.
    contents:
      - starts_with("rectangle_")
      - starts_with("variance_bounds_")
      - starts_with("folded_binomial_")
      - starts_with("binary_rectangle_")

  - title: Assignment rules and variance objectives
    desc: >
      Baseline allocation rules and regret/objective helpers for audits,
      examples, and simulations.
    contents:
      - starts_with("assign_")
      - variance_objective
      - oracle_variance
      - regret
      - matches("^(multiarm|stratified)_(variance_objective|oracle_variance|regret)$")

  - title: Diagnostics
    desc: >
      Small helpers for checking CMR certificates, coverage, boundary choices,
      and realized gains.
    contents:
      - coverage_indicator
      - certificate_valid
      - boundary_indicator
      - boundary_rate
      - saving_vs_balance
      - share_of_oracle_gain

  - title: Result display
    desc: >
      Print and summary methods for compact CMR result objects.
    contents:
      - print.cmr_two_arm

  - title: Package
    contents:
      - cmrdesign-package
